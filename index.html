    <div id="app-loader" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.5s ease-out;">

    <style>

      @keyframes loaderBar{0%{transform:translateX(-100%)}50%{transform:translateX(150%)}100%{transform:translateX(300%)}}
      @keyframes loaderTextFade{0%{opacity:0;transform:translateY(4px)}100%{opacity:0.5;transform:translateY(0)}}
    </style>

    </script>

    <!-- SPA navigation tracking: ensures gtag records page_view on client-side route changes -->
    <script>
      (function () {
        function sendPageView(path) {
          if (typeof gtag === 'function') {
            gtag('config', 'G-SHNTDD7CVJ', { page_path: path });
          }
        }

        // initial page view
        sendPageView(window.location.pathname + window.location.search);

        // patch history.pushState and replaceState to capture SPA navigations
        const _pushState = history.pushState;
        history.pushState = function () {
          _pushState.apply(this, arguments);
          setTimeout(() => sendPageView(window.location.pathname + window.location.search), 0);
        };

        const _replaceState = history.replaceState;
        history.replaceState = function () {
          _replaceState.apply(this, arguments);
          setTimeout(() => sendPageView(window.location.pathname + window.location.search), 0);
        };

        // back/forward
        window.addEventListener('popstate', function () {
          sendPageView(window.location.pathname + window.location.search);
        });
      })();
    </script>
